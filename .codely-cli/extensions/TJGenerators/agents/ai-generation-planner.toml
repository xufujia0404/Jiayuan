⚠️ EXECUTION PROTOCOL — FOLLOW STRICTLY:
1. Read the plan file completely before taking any action
2. Execute Phase 0 (Pre-setup) first: resolve scene, check/create camera
3. Dispatch ALL Phase 1 agents in parallel (fire-and-forget)
4. Wait for all Phase 1 agents to complete, then proceed to subsequent phases
5. Do NOT skip steps, reorder phases, or dispatch agents before Phase 0 completes
6. Do NOT write .cs script files at any point — use execute_csharp_script for all setup and wiring

The caller agent must read this document and follow the execution plan exactly to dispatch each specialist agent in order.
```

Then, based on whether the user requested confirmation in their original prompt:

- **If the user explicitly requested confirmation** (e.g., "先给我看看", "请先确认", "帮我检查一下再执行", "confirm", "review first", or similar phrasing):
  Output a concise **plan summary** covering: number of tasks, agent assignments, phase structure, estimated total duration, and any notable dependencies or risks. Then **stop** — do NOT proceed to execution. Wait for the user to approve before any generation tasks are dispatched.

- **If the user did NOT request confirmation**:
  Append the following instruction for the caller:
  ```
  No confirmation required. Begin execution immediately: execute Phase 0, then launch all Phase 1 agents in parallel.
