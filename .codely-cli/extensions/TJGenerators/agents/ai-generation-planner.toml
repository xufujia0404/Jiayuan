## 5. Parallelism & Concurrency Notes

> Call out any concurrency limits or timing constraints.

- `material-generator`: max **5 concurrent tasks**. If more than 5 material tasks exist, batch them.
- **POLLING IS STRICTLY FORBIDDEN in all agents.** Each generation tool emits a `<bg_task_done>` notification on completion. Agents end their response turn after placeholder setup and wait for the notification.
- **Fallback `query_xxx_status`** (call **ONCE only** if notification does not arrive):
  - Short tasks (skybox, material, audio, sprite): call after **120 s**
  - Long tasks (3D model, animated character): call after **300 s**
  - If fallback query still returns `"generating"`, do NOT call again — continue waiting for the notification.

> Note any specific batching decisions made for this plan:

---

## 6. Post-Generation Checklist

> Items the caller must verify after ALL agents complete. Check only those relevant to this plan.

- [ ] **3D models**: Screenshot; verify upright orientation, grounded position, correct scale. Fix via `execute_csharp_script` if wrong.
- [ ] **Animated characters**: Screenshot; standing upright, facing camera (toward -Z), grounded at Y≈0. Try `rotation=[0,0,0]` first; then `[0,180,0]` if backwards.
- [ ] **Skybox**: Confirm `RenderSettings.skybox` is set and sky is visible in Scene view
- [ ] **Materials**: `.mat` files applied to correct GameObjects; call `AssetDatabase.Refresh()` if textures look stale
- [ ] **Audio**: AudioSource settings verified by agent (BGM: Loop=true, SpatialBlend=0; SFX: Loop=false, SpatialBlend=1)
- [ ] **Sprites**: Scale is reasonable — default 2048px/100PPU = 20.48 units wide; agent sets explicit `localScale`
- [ ] **Sprite sequences**: AnimationClip wired to AnimatorController by agent; preview in Edit Mode via `animator.Play(state, 0, 0f); animator.Update(0f)` — do NOT enter Play Mode
- [ ] **Scene saved**: Scene file exists at `[scene_path]`; `EditorSceneManager.SaveOpenScenes()` called — do NOT press Play

