## 4. Execution Plan

> Execute phases in strict order. Phase 0 is ALWAYS required before any agent is dispatched.

### Phase 0 — Pre-setup (REQUIRED before dispatching any agents)

Execute ALL of the following using `execute_csharp_script` or `unity_scene` before dispatching any specialist agent:

**Step 0 — Verify Unity login (abort if not logged in)**

All generation tools require a valid Unity Connect session. Check before doing anything else:

```csharp
// execute_csharp_script — do NOT write a .cs file
using Unity.UniAsset.Manager.Editor.InternalBridge;

var token = UnityConnectSession.instance.GetAccessToken();
if (string.IsNullOrEmpty(token)) {
    Debug.LogError("NOT LOGGED IN: Unity Connect access token is empty. Open Window → Unity Connect and sign in before generating assets.");
} else {
    Debug.Log("Unity login verified: access token present.");
}
```

**If the token is empty, stop immediately and report to the caller:**
> "Cannot proceed — Unity Editor is not logged in. Please open **Window → Unity Connect**, sign in, then retry."
> Do NOT proceed to Step 1 or dispatch any agents.

---

**Step 1 — Resolve the active scene**

Check if a scene is loaded. If not (empty path or "Untitled"), create and save one:

```csharp
// execute_csharp_script — do NOT write a .cs file
using UnityEngine;
using UnityEditor;
using UnityEditor.SceneManagement;

var scene = EditorSceneManager.GetActiveScene();
if (!scene.IsValid() || string.IsNullOrEmpty(scene.path)) {
    System.IO.Directory.CreateDirectory(Application.dataPath + "/Scenes");
    var newScene = EditorSceneManager.NewScene(NewSceneSetup.DefaultGameObjects, NewSceneMode.Single);
    EditorSceneManager.SaveScene(newScene, "Assets/Scenes/GenerationScene.unity");
    Debug.Log("Created new scene: Assets/Scenes/GenerationScene.unity");
} else {
    Debug.Log("Active scene: " + scene.path);
}
```

**Step 2 — List existing scene objects**

```python
unity_scene(action="list")
```

Note what already exists — each specialist agent does its own duplicate check, but this gives the caller context to detect conflicts early.

**Step 3 — Ensure Camera is present and correctly positioned**

```csharp
// execute_csharp_script — do NOT write a .cs file
using UnityEngine;
using UnityEditor;

var cam = Camera.main;
if (cam == null) cam = UnityEngine.Object.FindObjectOfType<Camera>();
if (cam == null) {
    var camGO = new GameObject("Main Camera");
    cam = camGO.AddComponent<Camera>();
    camGO.tag = "MainCamera";
    Debug.Log("Camera created.");
}
// Adjust position/FOV to frame all planned assets — tune per plan layout
cam.transform.position = new Vector3(0f, 3f, -8f);
cam.transform.LookAt(Vector3.zero);
cam.fieldOfView = 60f;
EditorUtility.SetDirty(cam);
Debug.Log($"Camera: pos={cam.transform.position} fov={cam.fieldOfView}");
```

> If generated assets span a wide range (e.g. X = -6 to +6), move camera back (Z = -12) or raise FOV to 75°.

**Step 4 — Take a baseline screenshot**

```python
unity_screenshot(note="Phase 0 baseline — scene state before any generation")
```

Only after ALL Phase 0 steps complete, proceed to Phase 1.

---

### Phase 1 — Kick off all independent tasks

Dispatch the following agents **in parallel** (no dependencies between them).

**Each agent handles its own placeholder placement and post-completion wiring internally — the caller only needs to dispatch the agent with the correct inputs.**

- **T01 · [Task Name]** → call `[agent-name]`
  - task: "[brief task description including any animation or style details]"
  - prompt: "..."
  - [other inputs: prefab_output_path / target_object / audio_type / animation_type / etc.]
  - constraints: "position=(x,y,z) [rotation=(rx,ry,rz)] [scale=(sx,sy,sz)]"
  - *(Agent internally: fires generation → places placeholder at position → ends response turn → waits for `<bg_task_done>` notification → wires/fixes on complete)*

- **T02 · [Task Name]** → call `[agent-name]`
  - [inputs and constraints]
  - *(Agent internally: fires generation → places/applies placeholder → ends response turn → waits for `<bg_task_done>` notification → auto-updates on complete)*

> While Phase 1 agents generate (bottleneck: ~[X–Y] min for slowest task), the caller may do additional scene organization via `execute_csharp_script` if needed (e.g., create empty parent GameObjects for hierarchy grouping). Do NOT write any `.cs` files — use `execute_csharp_script` only.

---

### Phase 2 — Tasks with sequential dependencies (if any)

Start **only after** the listed Phase 1 tasks complete.

- **T03 · [Task Name]** (depends on T01) → call `[agent-name]`
  - Wait for: T01 `status == "completed"`, read `[result_field]` from agent output
  - task: "[description]"
  - [inputs and constraints]
  - *(Agent internally handles placeholder and wiring)*

---

### Phase N — Final integration

After ALL generation agents report completion:

1. Take a final screenshot to verify all assets are visible and correctly placed:
   ```python
   unity_screenshot(note="Final verification — all assets in scene")
   ```
2. If any placement issue is visible (wrong orientation, scale, occlusion), fix it via `execute_csharp_script` — do NOT re-run the generation agent.
3. Save the scene:
   ```csharp
   // execute_csharp_script — do NOT write a .cs file
   using UnityEditor.SceneManagement;
   EditorSceneManager.SaveOpenScenes();
   Debug.Log("Scene saved.");
   ```
4. Do NOT press Play. Leave Play Mode testing to the user.

