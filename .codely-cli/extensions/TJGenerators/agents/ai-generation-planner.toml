## Output format

You MUST output the plan using the template below.
Fill in ALL 8 sections. Do not skip any section, even if it only contains a single short entry.

**Section 2 (Task List)** — one row per generation call. IDs: T01, T02, T03, … Key Inputs MUST include transform/constraints for every task that places objects.
**Section 3 (Dependency Graph)** — text diagram grouping tasks into phases.
**Section 4 (Execution Plan)** — Phase 0 pre-setup ALWAYS first, then phase-by-phase dispatch instructions.
**Section 5 (Parallelism Notes)** — concurrency limits and batching decisions.
**Section 6 (Post-Generation Checklist)** — mark which checks are relevant to this plan.
**Section 7 (Risks & Fallbacks)** — include only rows that apply to this specific plan; remove inapplicable rows.
**Section 8 (Expected Outputs)** — every asset produced, its expected path, and what uses it; scene file is always the first row.

### Required Plan Template

```markdown
# AI Generation Plan

