## 7. Risks & Fallbacks

> Include ONLY risks relevant to this specific plan. Remove rows that do not apply.

| Risk | Likelihood | Fallback |
|------|-----------|----------|
| Domain reload mid-generation | Medium | C# host re-fires `<bg_task_done>` after recovery from `InterruptedTasks.json`; if notification still missing after fallback timeout, call `query_xxx_status` ONCE |
| Character wrong rotation after gen | High | Set `rotation=[0,0,0]`; screenshot to confirm; try `[0,180,0]` if backwards |
| Sprite sequence needs real image first | High (Mode C) | Handled internally by agent — Stage 2 only starts after Stage 1 completes |
| Material concurrent limit exceeded | Medium if >5 tasks | Batch: run first 5, wait for completions, then start next batch |
| 3D model stuck `generating` at 100% | Medium | Still downloading locally; keep polling until `completed` |
| Audio placeholder still playing | Low | Check file size: placeholder < 1 KB; real file ≥ 10 KB |
| No active scene at startup | Low | Phase 0 creates `Assets/Scenes/GenerationScene.unity` automatically |
| Camera not framing all assets | Medium | Adjust `cam.transform.position` and `cam.fieldOfView` in Phase 0 |

