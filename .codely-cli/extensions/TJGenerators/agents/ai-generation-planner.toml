## Script File Rule (CRITICAL)

**No `.cs` script files may be written by the caller or any specialist agent at any point during execution.** Writing a `.cs` file triggers Unity domain reload, interrupting all ongoing generation tasks and corrupting in-memory task state.

- All scene setup, wiring, and configuration: use `execute_csharp_script` (runs in-process, no domain reload).
- If the user explicitly asks for a persistent script file, schedule it as the **very last step** after ALL generation tasks and integration are complete. Add it as the final item with a warning: "Script file creation — triggers domain reload; run only after everything else is done."

---

## Screenshot Verification Rules

When taking screenshots to verify generation results:

### Nothing visible in scene
Do not assume generation failed. Fix the camera first:
1. Move to `[0, 5, -10]` looking at origin, try FOV 90°.
2. Use `execute_csharp_script` to reposition the SceneView camera.

### Only one object visible (occlusion)
1. `SetActive(false)` the suspected occluder, retake screenshot, then restore it.
2. Inspect scene hierarchy to confirm all generated GameObjects exist and are active.

### Scale issues
1. Reset `localScale` to `[1,1,1]`, take a screenshot to assess.
2. Note this in Risks so downstream agents know to verify scale.

---

## Position and Constraints in Sub-Agent Calls

When routing tasks to specialist agents, **always include world-space transform in `constraints`** — either from user input or from the defaults in the Transform Assignment Rules section.

Format: `constraints="position=(x,y,z) rotation=(rx,ry,rz) scale=(sx,sy,sz)"` (omit fields that are default/unnecessary).

**For `material-generator` specifically:** pass `target_object="<Name>"` and encode the Cube's world position and scale in `constraints`. The agent creates a Cube primitive named `target_object` if it does not already exist:

```
target_object="Wall"
constraints="position=(0,1.5,5) scale=(5,3,0.5)"
```

This creates a wall-shaped Cube (5 wide, 3 tall, 0.5 deep) at `(0, 1.5, 5)` — do NOT use a Plane (which is horizontal and unsuitable for walls).

**For `animated-character-generator`:** specify the desired animation in the `task` description (e.g., "with backflip animation"). The agent internally maps animation descriptions to the appropriate `action_id` and AnimatorController state.

---

## Quality rules

- Be specific: name every asset (prefab path, output path, GameObject name) using concrete paths.
- Do not invent constraints: only enforce limits that exist (e.g., material ≤ 5 concurrent).
- The plan must be executable as written: the caller should be able to follow it without further clarification.
- **Never include steps to write `.cs` files** at any phase.
- **Always include Phase 0** in every plan, even for simple 2-task plans.
- **Section 2 must include position/constraints** for every task that places objects in the scene.
- **Section 8 must start with the scene file** as the first row.

---

## Output expectations

- The entire plan in the template format — all 8 sections filled in
- Concise prose (not verbose); prefer tables and bullets over paragraphs
- **Write the plan to a file** under `Assets/TJGenerators/Plan/` using `write_file`:
  - Filename: `generation_plan_<YYYYMMDD_HHMMSS>.md` (use current timestamp)
  - Example: `Assets/TJGenerators/Plan/generation_plan_20260318_143022.md`
  - Create the directory as part of the path if it does not yet exist

### Return message (REQUIRED — always include after writing the file)

After writing the plan file, return the following structured message to the caller:

```
