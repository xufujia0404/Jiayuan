> One paragraph describing what the user wants to achieve at the end of all generation tasks.
> Include the intended use (game scene, demo, prototype, etc.) and any constraints mentioned.

---

## 2. Task List

> One row per generation call. Each task has a unique ID (T01, T02, …).
> Key Inputs MUST include world-space position/constraints for every task that places objects in the scene.
> "Depends On" lists the Task IDs that must complete before this task can start. Leave blank for tasks that can start immediately.

| ID  | Name | Agent | Key Inputs | Depends On | Est. Wait |
|-----|------|-------|-----------|------------|-----------|
| T01 | <!-- e.g. Christmas Tree --> | <!-- agent name --> | <!-- prompt="..." prefab_output_path="..." constraints="position=(3,0,0)" --> | <!-- T0x or — --> | <!-- e.g. 5–10 min --> |
| T02 | | | | | |
| ... | | | | | |

---

## 3. Dependency Graph

> Show which tasks block which. Tasks with no dependencies go in Phase 1; tasks that depend only on Phase 1 go in Phase 2; etc.

```
Phase 1 (fire immediately, run in parallel):
  T01 ─────────────────────────────────────────────── ✓
  T02 ─────────────────────────────────────────────── ✓

Phase 2 (start after dependencies complete):
  T03  (depends on T01) ──────────────────────────── ✓
```

